<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>订单列表</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 920px; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
    input, button, select { padding: 8px; margin: 6px 0; }
    a { color: #1677ff; }
    .badge { display:inline-block; padding:2px 6px; border-radius: 12px; font-size:12px; color:#fff; }
    .b-wait { background:#ff9800; }
    .b-paid { background:#4caf50; }
    .b-delivered { background:#2196f3; }
    .b-overdue { background:#e53935; }
  </style>
</head>
<body>
  <h1>订单列表</h1>
  <div class="box">
    <div>管理员令牌</div>
    <input id="adm" placeholder="ADMIN_TOKEN（默认：admin-demo-token）"/>
    <button onclick="save()">保存令牌</button>
    <div id="msg"></div>
  </div>
  <div class="box">
    <div>
      <label>筛选状态（可多选）</label>
      <select id="st" multiple size="4" onchange="load()">
        <option value="待支付">待支付</option>
        <option value="已支付">已支付</option>
        <option value="已交付">已交付</option>
        <option value="逾期交付">逾期交付</option>
      </select>
      <button onclick="selectAllSt()">全选</button>
      <button onclick="clearSt()">清空选择</button>
      <button onclick="onlyOverdue()">仅显示逾期</button>
      <button onclick="load()">刷新列表</button>
      <button onclick="downloadOrderDetails()">下载订单明细CSV</button>
    </div>
    <table>
      <thead>
        <tr><th>订单号</th><th>用户</th><th>项目</th><th>金额</th><th>状态</th><th>创建时间</th><th>操作</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div class="box"><a href="/web/admin/index.html">返回后台首页</a></div>
  <script src="/web/utils.js"></script>
  <script>
    function adm() { return localStorage.getItem('adm_token') || 'admin-demo-token'; }
    function save() { localStorage.setItem('adm_token', document.getElementById('adm').value.trim()); document.getElementById('msg').textContent='已保存'; }
    document.getElementById('adm').value = adm();
    let lastOrders = [];
    let bannedSet = new Set();
    async function fetchOrderDetail(id) {
      const r = await fetch('/api/admin/orders/detail?oid=' + encodeURIComponent(id), { headers:{ Authorization: adm() }});
      if (!r.ok) return null;
      return await r.json();
    }
    async function load() {
      try {
        const br = await fetch('/api/admin/users/banned', { headers:{ Authorization: adm() }});
        if (br.ok) {
          const bl = await br.json();
          bannedSet = new Set((bl||[]).map(x=>x.user_id));
        }
      } catch {}
      const rp = await fetch('/api/admin/projects/list', { headers:{ Authorization: adm() }});
      const proj = rp.ok ? await rp.json() : [];
      const pmap = {}; for (const p of proj) pmap[p.id] = p;
      const sel = Array.from(document.querySelectorAll('#st option:checked')).map(o=>o.value);
      const r = await fetch('/api/admin/orders/list', { method:'POST', headers:{ 'Content-Type':'application/json', Authorization: adm() }, body: JSON.stringify({ status: null, limit: 200 })});
      const tb = document.getElementById('rows'); tb.innerHTML='';
      if (!r.ok) { tb.innerHTML = '<tr><td colspan="7">加载失败</td></tr>'; return; }
      let arr = await r.json();
      if (sel.length > 0) {
        arr = arr.filter(x => {
          let statusText = x.status;
          try {
            const p = pmap[x.project_id] || null;
            if (p && x.status === '已支付') {
              const sla = parseInt(p.sla_hours || 0);
              const t0 = new Date(x.created_at).getTime();
              const now = Date.now();
              if (sla > 0 && now - t0 > sla * 3600 * 1000) statusText = '逾期交付';
            }
          } catch {}
          return sel.includes(statusText);
        });
      }
      lastOrders = arr;
      for (const it of arr) {
        const tr = document.createElement('tr');
        const deliver = document.createElement('a'); deliver.href = '/web/admin/chat_console.html?uid=' + encodeURIComponent(it.user_id); deliver.textContent = '交付';
        let statusText = it.status;
        try {
          const p = pmap[it.project_id] || null;
          if (p && it.status === '已支付') {
            const sla = parseInt(p.sla_hours || 0);
            const t0 = new Date(it.created_at).getTime();
            const now = Date.now();
            if (sla > 0 && now - t0 > sla * 3600 * 1000) statusText = '逾期交付';
          }
        } catch {}
        const created = formatCST(it.created_at);
        let cls = 'b-paid';
        if (statusText === '待支付') cls = 'b-wait';
        else if (statusText === '已交付') cls = 'b-delivered';
        else if (statusText === '逾期交付') cls = 'b-overdue';
        const badge = '<span class="badge ' + cls + '">' + statusText + '</span>';
        const bannedTag = bannedSet.has(it.user_id) ? '<span style="color:#e53935; margin-left:6px;">已禁止</span>' : '';
        tr.innerHTML = '<td>' + it.order_no + '</td><td style="font-family: monospace;">' + it.user_id + bannedTag + '</td><td>' + it.project_id + '</td><td>' + it.amount + '</td><td>' + badge + '</td><td>' + created + '</td><td></td>';
        tr.children[6].appendChild(deliver);
        const mk = document.createElement('a'); mk.href='/web/admin/chat_console.html?uid=' + encodeURIComponent(it.user_id); mk.textContent='交付标记'; mk.style.marginLeft='8px';
        tr.children[6].appendChild(mk);
        const ban = document.createElement('a'); ban.href='#'; ban.textContent='禁止用户'; ban.style.marginLeft='8px';
        ban.onclick = async (e)=>{ e.preventDefault(); await banUser(it.user_id); };
        tr.children[6].appendChild(ban);
        const unban = document.createElement('a'); unban.href='#'; unban.textContent='解除禁止'; unban.style.marginLeft='8px';
        unban.onclick = async (e)=>{ e.preventDefault(); await unbanUser(it.user_id); };
        tr.children[6].appendChild(unban);
        const tl = document.createElement('a'); tl.href='#'; tl.textContent='时间线'; tl.style.marginLeft='8px';
        tl.onclick = async (e) => {
          e.preventDefault();
          const rr = await fetch('/api/orders/timeline?oid=' + encodeURIComponent(it.order_id), { headers:{ Authorization: adm() }});
          if (rr.ok) {
            const evs = await rr.json();
            const lines = (evs||[]).map(x => (formatCST(x.ts) + ' ' + x.name + (x.detail ? (' - '+x.detail) : '')));
            alert(lines.join('\n') || '暂无时间线');
          }
        };
        tr.children[6].appendChild(tl);
        const dt = document.createElement('a'); dt.href='#'; dt.textContent='明细'; dt.style.marginLeft='8px';
        dt.onclick = async (e) => {
          e.preventDefault();
          const d = await fetchOrderDetail(it.order_id);
          if (!d) { alert('加载明细失败'); return; }
          let ov = document.getElementById('detail_overlay');
          if (!ov) {
            ov = document.createElement('div'); ov.id='detail_overlay'; ov.style.position='fixed'; ov.style.left='0'; ov.style.top='0'; ov.style.right='0'; ov.style.bottom='0'; ov.style.background='rgba(0,0,0,0.5)'; ov.style.display='none'; ov.style.alignItems='center'; ov.style.justifyContent='center'; ov.style.zIndex='99999';
            const box = document.createElement('div'); box.id='detail_box'; box.style.background='#fff'; box.style.padding='16px'; box.style.borderRadius='8px'; box.style.maxWidth='720px'; box.style.maxHeight='80vh'; box.style.overflow='auto'; box.style.boxShadow='0 8px 24px rgba(0,0,0,0.3)';
            ov.appendChild(box);
            ov.onclick = (e)=>{ if (e.target===ov) ov.style.display='none'; };
            document.body.appendChild(ov);
          }
          const box = document.getElementById('detail_box');
          const fields = d.fields || {};
          const req = d.required_fields || [];
          const opt = d.optional_fields || [];
          const rows = [];
          if (req.length===0 && opt.length===0) {
            const ks = Object.keys(fields);
            if (ks.length===0) rows.push('<tr><td colspan="3">无表单字段</td></tr>');
            else for (const k of ks) rows.push('<tr><td></td><td>'+k+'</td><td>'+String(fields[k]??'')+'</td></tr>');
          } else {
            for (const k of req) rows.push('<tr><td>必填</td><td>'+k+'</td><td>'+String(fields[k]??'')+'</td></tr>');
            for (const k of opt) rows.push('<tr><td>选填</td><td>'+k+'</td><td>'+String(fields[k]??'')+'</td></tr>');
          }
          const head = '<div style="font-weight:600; margin-bottom:8px;">订单号：'+(d.order_no||'')+' · 用户：'+(d.user_id||'')+' · 项目ID：'+(d.project_id??'')+'</div>';
          const btns = '<div style="margin-bottom:8px;"><button id="detail_close_btn">关闭</button> <button id="detail_download_btn">下载该订单明细</button></div>';
          const tbl = '<table style="width:100%; border-collapse:collapse;"><thead><tr><th style="border:1px solid #eee; padding:6px;">字段类型</th><th style="border:1px solid #eee; padding:6px;">字段名</th><th style="border:1px solid #eee; padding:6px;">字段值</th></tr></thead><tbody>'+rows.join('')+'</tbody></table>';
          box.innerHTML = head + btns + tbl;
          document.getElementById('detail_close_btn').onclick = ()=>{ ov.style.display='none'; };
          document.getElementById('detail_download_btn').onclick = async ()=>{
            const header = ['订单号','用户','项目ID','金额','状态','创建时间','字段类型','字段名','字段值'];
            const lines = [header.join(',')];
            const pushRow = (ftype, name, value) => {
              const row = [
                d.order_no||'', d.user_id||'', String(d.project_id??''), String(d.amount??''), d.status||'', d.created_at||'', ftype, name||'', String(value??'')
              ].map(x => String(x).replace(/\"/g,'\"\"'));
              lines.push(row.join(','));
            };
            if (req.length===0 && opt.length===0) {
              const keys = Object.keys(fields);
              if (keys.length===0) pushRow('', '', '');
              else for (const k of keys) pushRow('', k, fields[k]);
            } else {
              for (const k of req) pushRow('必填', k, fields[k]);
              for (const k of opt) pushRow('选填', k, fields[k]);
            }
            const csv = '\uFEFF' + lines.join('\n');
            const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '订单明细_'+(d.order_no||'')+'.csv'; a.click(); URL.revokeObjectURL(a.href);
          };
          ov.style.display='flex';
        };
        tr.children[6].appendChild(dt);
        tb.appendChild(tr);
      }
    }
    load();
    function selectAllSt() {
      const s = document.getElementById('st');
      Array.from(s.options).forEach(o => o.selected = true);
      load();
    }
    function clearSt() {
      const s = document.getElementById('st');
      Array.from(s.options).forEach(o => o.selected = false);
      load();
    }
    function onlyOverdue() {
      const s = document.getElementById('st');
      Array.from(s.options).forEach(o => o.selected = (o.value === '逾期交付'));
      load();
    }
    // 下载列表CSV功能与订单明细重复，已移除
    async function downloadOrderDetails() {
      const LABELS = { name:'名字', phone:'电话', id_card:'身份证号码', wechat_id:'微信号', card_no:'银行卡号', bank_name:'开户行', image_url:'图片', qq_id:'QQ号', douyin_id:'抖音号', weibo_id:'微博号', xhs_id:'小红书号', passport_no:'护照号', corp_name:'企业名称', corp_credit_code:'企业信用代码' };
      const STANDARD_KEYS = ['name','phone','image_url','id_card','wechat_id','card_no','bank_name','qq_id','douyin_id','weibo_id','xhs_id','passport_no','corp_name','corp_credit_code'];
      const details = [];
      const fieldSet = new Set();
      for (const it of lastOrders) {
        const d = await fetchOrderDetail(it.order_id);
        if (!d) continue;
        details.push(d);
        const req = d.required_fields || [];
        const opt = d.optional_fields || [];
        const keys = [...new Set([...(req||[]), ...(opt||[]), ...Object.keys(d.fields||{})])];
        for (const k of keys) fieldSet.add(k);
      }
      const fieldKeys = Array.from(new Set([...STANDARD_KEYS, ...fieldSet]));
      const header = ['订单号','用户','项目ID','金额','状态','创建时间', ...fieldKeys.map(k => (LABELS[k] || k))];
      const lines = [header.join(',')];
      for (const d of details) {
        const base = [
          d.order_no || '',
          d.user_id || '',
          String(d.project_id ?? ''),
          String(d.amount ?? ''),
          d.status || '',
          d.created_at || '',
        ];
        const row = base.concat(fieldKeys.map(k => String((d.fields||{})[k] ?? '').replace(/"/g,'""')));
        lines.push(row.join(','));
      }
      const csv = '\uFEFF' + lines.join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '订单明细_含表单字段.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    }
    async function banUser(uid) {
      if (!uid) return;
      const r = await fetch('/api/admin/users/ban', { method:'POST', headers:{ 'Content-Type':'application/json', Authorization: adm() }, body: JSON.stringify({ user_id: uid })});
      alert(r.ok ? '已禁止用户 ' + uid : '禁止失败');
    }
    async function unbanUser(uid) {
      if (!uid) return;
      const r = await fetch('/api/admin/users/unban', { method:'POST', headers:{ 'Content-Type':'application/json', Authorization: adm() }, body: JSON.stringify({ user_id: uid })});
      alert(r.ok ? '已解除禁止 ' + uid : '解除失败');
    }
  </script>
  <script src="/web/support.js"></script>
  <script>addSupportEntry();</script>
  </body>
</html>
