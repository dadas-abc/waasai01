<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>提交订单</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 640px; }
    input, button { padding: 8px; margin: 6px 0; width: 100%; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
    .ok { color: #0a0; } .err { color: #a00; } a { color: #1677ff; }
    .hint { color:#666; font-size:12px; margin-top:-4px; }
    .err_input { border: 1px solid #e53935 !important; box-shadow: 0 0 0 2px rgba(229,57,53,0.1); }
    .field { margin-bottom: 12px; }
  </style>
</head>
<body>
  <h1>提交订单</h1>
  <div class="box">
    <div id="project_info"></div>
    <div id="fields"></div>
    <button onclick="submitOrder()">提交订单</button>
    <div id="msg"></div>
    <div class="meta"><a href="/web/index.html">返回首页</a></div>
  </div>
  <script>
    function q(k) { const u = new URL(location.href); return u.searchParams.get(k); }
    const FNS = {
      name: x => /^[A-Za-z\u4e00-\u9fa5][A-Za-z\u4e00-\u9fa5\s]{1,49}$/.test(x),
      phone: x => /^1[3-9]\d{9}$/.test(x),
      id_card: x => /^(?:\d{15}|\d{17}[\dXx])$/.test(x),
      wechat_id: x => /^[a-zA-Z][-_a-zA-Z0-9]{5,19}$/.test(x),
      card_no: x => /^\d{12,19}$/.test(x),
      image_url: x => /^https?:\/\//.test(x) || (x||'').startsWith('/web/uploads/'),
      qq_id: x => /^\d{5,11}$/.test(x),
      douyin_id: x => /^[a-zA-Z0-9_.-]{3,24}$/.test(x),
      weibo_id: x => /^[a-zA-Z0-9_]{2,30}$/.test(x),
      xhs_id: x => /^[a-zA-Z0-9_]{3,24}$/.test(x),
      passport_no: x => /^[A-Za-z][A-Za-z0-9]{7,17}$/.test(x)
    };
    let proj = null;
    async function loadProject() {
      const id = q('id');
      const info = document.getElementById('project_info');
      if (!id) { info.textContent = '无效项目'; return; }
      const r = await fetch('/api/projects/' + id);
      if (!r.ok) { info.textContent = '项目不存在'; return; }
      proj = await r.json();
      info.textContent = proj.name + '（价格：¥' + proj.price + '，交付时效：' + proj.sla_hours + ' 小时）';
      renderFields();
    }
    function renderFields() {
      const wrap = document.getElementById('fields'); wrap.innerHTML = '';
      const req = new Set(proj.required_fields||[]);
      const all = Array.from(new Set([...(proj.required_fields||[]), ...(proj.optional_fields||[])]));
      const LABELS = { name:'姓名', phone:'手机号', id_card:'身份证号码', wechat_id:'微信号', card_no:'银行卡号', image_url:'图片', qq_id:'QQ号', douyin_id:'抖音号', weibo_id:'微博号', xhs_id:'小红书号', passport_no:'护照号', corp_name:'企业名称', corp_credit_code:'企业信用代码' };
      for (const f of all) {
        const row = document.createElement('div'); row.className='field';
        const label = document.createElement('div');
        label.textContent = (LABELS[f] || f) + (req.has(f) ? '（必填）' : '（选填）');
        row.appendChild(label);
        if (f === 'image_url') {
          const file = document.createElement('input'); file.type='file'; file.accept='image/*'; file.id='file_image';
          const btnUp = document.createElement('button'); btnUp.textContent='上传图片'; btnUp.type='button';
          const stat = document.createElement('div'); stat.className='hint'; stat.id='up_msg';
          const hidden = document.createElement('input'); hidden.type='text'; hidden.id='f_image_url'; hidden.placeholder='图片URL';
          btnUp.onclick = async () => {
            const fobj = document.getElementById('file_image').files[0];
            if (!fobj) { stat.textContent='请先选择图片'; return; }
            const buf = await fobj.arrayBuffer();
            const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
            const r = await fetch('/api/uploads/base64', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ filename: fobj.name, content_b64: b64, mime_type: fobj.type||'image/jpeg' })});
            if (r.ok) { const d = await r.json(); hidden.value = d.url; stat.textContent='已上传：' + d.url; }
            else { stat.textContent='上传失败'; }
          };
          row.appendChild(file); row.appendChild(btnUp); row.appendChild(stat); row.appendChild(hidden);
        } else {
          const inp = document.createElement('input'); inp.id = 'f_'+f; inp.placeholder = (proj.field_hints||{})[f] || (LABELS[f]||f);
          row.appendChild(inp);
        }
        const hintText = (proj.field_hints||{})[f];
        if (hintText) { const hint = document.createElement('div'); hint.className='hint'; hint.textContent = hintText; row.appendChild(hint); }
        const err = document.createElement('div'); err.className='hint'; err.style.color='#e53935'; err.style.display='none'; err.id='err_'+f; row.appendChild(err);
        wrap.appendChild(row);
      }
    }
    async function submitOrder() {
      const token = localStorage.getItem('token'); const msg = document.getElementById('msg');
      if (!token) { msg.innerHTML = '<span class="err">未登录，请先返回首页登录</span>'; return; }
      const fields = {};
      const req = new Set(proj.required_fields||[]);
      const all = Array.from(new Set([...(proj.required_fields||[]), ...(proj.optional_fields||[])]));
      for (const f of all) {
        const el = document.getElementById('f_'+f);
        if (el) { el.classList.remove('err_input'); const e = document.getElementById('err_'+f); if (e) e.style.display='none'; }
      }
      for (const f of all) {
        const v = (document.getElementById('f_'+f).value || '').trim();
        if (req.has(f) && !v) {
          const el = document.getElementById('f_'+f); if (el) el.classList.add('err_input');
          const e = document.getElementById('err_'+f); if (e) { e.textContent = '请填写：' + (f); e.style.display='block'; }
          msg.innerHTML = '<span class="err">请完善必填项</span>';
          return;
        }
        if (v) {
          if (FNS[f] && !FNS[f](v)) {
            const el = document.getElementById('f_'+f); if (el) el.classList.add('err_input');
            const e = document.getElementById('err_'+f); if (e) { e.textContent = '格式不正确：' + (f); e.style.display='block'; }
            msg.innerHTML = '<span class="err">请修正格式错误</span>';
            return;
          }
          fields[f] = v;
        }
      }
      const r = await fetch('/api/orders/create', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token }, body: JSON.stringify({ project_id: proj.id, fields }) });
      if (r.ok) {
        const d = await r.json(); msg.innerHTML = '<span class="ok">订单已创建：' + d.order_no + '</span> · <a href="/web/order_status.html?oid=' + d.order_id + '">查看状态</a>';
      } else {
        const e = await r.json().catch(()=>({detail:'error'})); msg.innerHTML = '<span class="err">创建失败：' + (e.detail||r.status) + '</span>';
      }
    }
    loadProject();
  </script>
  <script src="/web/support.js"></script>
  <script>addSupportEntry();</script>
</body>
</html>
