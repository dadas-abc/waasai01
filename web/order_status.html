<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>订单状态</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 720px; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
    .ok { color: #0a0; } .err { color: #a00; } a { color: #1677ff; }
    input, button { padding: 8px; margin: 6px 0; }
  </style>
</head>
<body>
  <h1>订单状态</h1>
  <div class="box">
    <div id="order"></div>
    <button onclick="refresh()">刷新</button>
    <a id="go_pay" href="#" style="display:none;">去支付</a>
    <div class="meta"><a href="/web/index.html">返回首页</a> · <a href="/web/chat.html">客服</a></div>
  </div>
  <script>
    function q(k) { const u = new URL(location.href); return u.searchParams.get(k); }
    async function refresh() {
      const oid = q('oid'); const t = document.getElementById('order');
      const token = localStorage.getItem('token'); if (!token) { t.innerHTML = '<span class="err">未登录</span>'; return; }
      const r = await fetch('/api/orders/' + oid, { headers: { Authorization: 'Bearer ' + token }});
      if (!r.ok) { t.innerHTML = '<span class="err">订单不存在</span>'; return; }
      const d = await r.json(); t.innerHTML = '订单号：' + d.order_no + ' · 状态：' + d.status + ' · 金额：¥' + d.amount;
      const link = document.getElementById('go_pay');
      if (d.status === '待支付') {
        link.href = '/web/pay_gateway.html?oid=' + encodeURIComponent(oid);
        link.style.display = 'inline';
      } else {
        link.style.display = 'none';
      }
    }
    refresh();
  </script>
  <script src="/web/support.js"></script>
  <script>addSupportEntry();</script>
</body>
</html>
