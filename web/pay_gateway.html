<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>支付网关</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 720px; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
    .ok { color: #0a0; } .err { color: #a00; } a { color: #1677ff; }
  </style>
</head>
<body>
  <h1>支付网关（码池示例）</h1>
  <div class="box">
    <div style="margin-bottom:8px;">
      <div style="font-weight:600; margin-bottom:6px;">选择支付渠道</div>
      <label><input type="radio" name="ch" value="wechat" checked/> 微信支付</label>
      <label style="margin-left:12px;"><input type="radio" name="ch" value="alipay"/> 支付宝支付</label>
    </div>
    <div id="qr_wrap">
      <div id="hint">正在获取收款二维码…</div>
      <img id="qr" style="max-width: 360px; display:none; border:1px solid #eee;"/>
      <div id="fallback" style="display:none;">未配置码池，请<a href="/web/chat.html">联系客服</a>获取收款码</div>
    </div>
    <button id="btn_done" style="margin-top:8px;" onclick="done()">我已完成支付，发付款截图给客服</button>
    <div class="meta"><a id="back" href="#">返回订单状态</a> · <a href="/web/chat.html">客服</a></div>
  </div>
  <script>
    function q(k) { const u = new URL(location.href); return u.searchParams.get(k); }
    const oid = q('oid'); document.getElementById('back').href = '/web/order_status.html?oid=' + encodeURIComponent(oid || '');
    function currentChannel() {
      const radios = Array.from(document.querySelectorAll('input[name="ch"]'));
      const it = radios.find(x => x.checked); return it ? it.value : 'wechat';
    }
    async function loadQR() {
      const hint = document.getElementById('hint');
      const img = document.getElementById('qr');
      const fb = document.getElementById('fallback');
      try {
        const ch = currentChannel();
        const r = await fetch('/api/pay/codepool_for_order?oid=' + encodeURIComponent(oid||'') + '&channel=' + encodeURIComponent(ch));
        if (!r.ok) { hint.textContent = '获取失败'; return; }
        const d = await r.json();
        if (d.qr_url) {
          img.src = d.qr_url; img.style.display = 'block';
          hint.textContent = '请扫码完成支付';
        } else {
          hint.style.display = 'none'; fb.style.display = 'block';
        }
      } catch {
        hint.textContent = '获取失败';
      }
    }
    Array.from(document.querySelectorAll('input[name="ch"]')).forEach(x => x.onchange = loadQR);
    async function done() {
      const msg = '订单 ' + (oid||'') + ' 已付款，请查收';
      location.href = '/web/chat.html?oid=' + encodeURIComponent(oid||'') + '&msg=' + encodeURIComponent(msg);
    }
    loadQR();
  </script>
  <script src="/web/support.js"></script>
  <script>addSupportEntry();</script>
</body>
</html>
